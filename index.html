<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEMPLE OF BOOM</title>
  <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
      color: white;
      font-family: sans-serif;
    }
    #noncontent {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #message {
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="noncontent">
    <div id="message">Loading game...</div>
  </div>

  <!-- Attempt to load LimeJS from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/limejs/0.9.0/lime.min.js"></script>

  <script>
    // Initialize the game after LimeJS is loaded
    function initGame() {
      if (typeof lime !== "undefined") {
        console.log("LimeJS loaded successfully!");  // Log to console for debugging
        document.getElementById('message').style.display = 'none';  // Hide loading message

        // Create a new game director
        var director = new lime.Director(document.body, 800, 600);

        // Create a basic scene with a background color
        var scene = new lime.Scene();
        scene.setRenderer(lime.Renderer.CANVAS);
        director.replaceScene(scene);

        // Example: Add a basic shape to the scene (replace with your game objects)
        var shape = new lime.Sprite().setSize(100, 100).setFill('#FF0000').setPosition(400, 300);
        scene.appendChild(shape);

        // Simple game loop that changes color every frame
        var currentColor = 0;
        lime.scheduleManager.schedule(function() {
          shape.setFill(currentColor === 0 ? '#FF0000' : '#0000FF');
          currentColor = 1 - currentColor;
        });
      } else {
        console.error("LimeJS failed to load.");
        document.getElementById('message').innerText = "⚠️ Game failed to load. Please try again later.";
      }
    }

    // Check if LimeJS is ready and run game setup
    window.addEventListener("load", function () {
      if (typeof lime === "undefined") {
        console.error("LimeJS not found or failed to load!");
        document.getElementById('message').innerText = "⚠️ Failed to load game engine.";
      } else {
        setTimeout(initGame, 1000);  // Wait a second before starting the game
      }
    });

    // Prevent default behavior of touchmove (for mobile compatibility)
    window.addEventListener("touchmove", function (event) {
      event.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
