<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEMPLE OF BOOM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <!-- Replace this with your actual hosted JS path -->
  <script type="text/javascript" src="tb.js"></script>

  <script>
    window.addEventListener("touchmove", function (event) {
      event.preventDefault();
    }, { passive: false });

    if (typeof window.devicePixelRatio !== 'undefined' && window.devicePixelRatio > 2) {
      var meta = document.querySelector("meta[name=viewport]");
      meta.setAttribute('content', 'width=device-width, initial-scale=' + (2 / window.devicePixelRatio) + ', user-scalable=no');
    }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #noncontent {
      width: 100%;
      height: 100%;
    }
    #noncontent canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>
  <div id="noncontent"></div>

  <script>
    // Make sure lime.embed is defined in tb.js or elsewhere
    if (typeof lime !== 'undefined' && typeof lime.embed === 'function') {
      lime.embed("TempleBoom_CustomPreloader_mobile", "noncontent", 624, 400);
    } else {
      console.error("lime.embed is not defined. Check that tb.js is loading correctly.");
    }
  </script>
</body>
</html>
